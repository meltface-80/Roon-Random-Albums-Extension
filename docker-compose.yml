# Run with:  docker compose up -d
# Builds straight from the GitHub release tag — no container registry and no
# manual download step needed.
services:
  musicd-remote:
    build: https://github.com/meltface-80/MusicD-Remote.git#v1.6.41
    image: musicd-remote:1.6.41
    container_name: musicd-remote
    restart: unless-stopped
    network_mode: host
    volumes:
      - musicd-remote-data:/app/data

volumes:
  musicd-remote-data:
